# ==================================================================
#  nginx del Panel — configuración base
#  Escrita desde cero para este proyecto. Se instala en /opt/nginx-panel
#  y convive con el nginx que ya sirve el servidor.
#
#  Cada cuenta añade dos archivos en conf/cuentas/:
#     <user>.rtmp  → recibe el vivo y genera el HLS
#     <user>.http  → publica ese HLS en el puerto del cliente
# ==================================================================
worker_processes auto;
# Cada espectador consume descriptores de archivo. Con el límite por defecto
# del sistema (1024) nginx avisa y se queda corto justo al tener audiencia.
worker_rlimit_nofile 8192;
error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections 2048;
}

# ---- Entrada de video (RTMP) --------------------------------------
rtmp {
    include cuentas/*.rtmp;
}

# ---- Salida de video (HLS por HTTPS) ------------------------------
http {
    include       mime.types;
    default_type  application/octet-stream;

    # Servir video: sin sendfile para que los fragmentos salgan al momento.
    # `aio` requiere compilar con --with-file-aio y no aporta nada aquí:
    # los fragmentos HLS son pequeños y se leen del caché del sistema.
    sendfile     off;
    tcp_nopush   on;
    directio     512;

    keepalive_timeout  65;
    client_max_body_size 5000M;      # subidas de video grandes

    log_format  video  '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';

    include cuentas/*.http;
}
